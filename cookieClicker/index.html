<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">

	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-G3VRHWGPB7"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag(){dataLayer.push(arguments);}
		gtag('js', new Date());

		gtag('config', 'G-G3VRHWGPB7');
	</script>

	<link rel="stylesheet" href="style.css">
	<title>"Cookie"クリッカー</title>
</head>
<body>
	<div id="main">
		<div id="display">
			<div>
				<span id="cookieCount">0</span>
				個のクッキーを許可済み
			</div>
			<div>
				<span><span id=""></span></span>
			</div>
		</div>
		<div id="cookie">
			<img src="data/info.svg" width="50">
			<span id="cookieSentence">
				当ページでは、サイトの利便性向上のためCookieを使用しています。
				<label><input type="checkbox" id="cookieAgree">
					<span>プライバシーポリシー</span>に同意する</label>
			</span>
			<span id="cookieBts">
				<button disabled>拒否しない</button>
				<button disabled>許可する</button>
			</span>
		</div>
	</div>
	<div id="upgrade">
		<div id="byteDisplay">
			<span id="upgradeCookieCount">0</span>個のクッキーが
			<span id="byteCount">0B</span>
			のデータを使用
		</div>
		<button id="dataMult" onclick="buy(0)">
			<span class="icon"><img src="data/plus.svg" width="70"></span>
			<span class="text">
				<span>
					<span>使用するデータの量を増加</span>
					<span>Lv. <span class="level">1</span></span>
				</span>
				<div>
					<span>
						*<span class="nowVal">1.0</span>
						→
						*<span class="nextVal">1.1</span>
					</span>
					<span><span class="cost">100B</span> を消費</span>
				</div>
			</span>
		</button>
		<button id="agreeChecked" onclick="buy(1)">
			<span class="icon"><img src="data/checkbox.svg" width="70"></span>
			<span class="text">
				<span>
					<span>同意がチェック済みの確率</span>
					<span>Lv. <span class="level">0</span></span>
				</span>
				<div>
					<span>
						<span class="nowVal">0.0</span>%
						→
						<span class="nextVal">0.5</span>%
					</span>
					<span><span class="cost">10B</span> を消費</span>
				</div>
			</span>
		</button>
	</div>
	<script src="script.js"></script>
</body>
</html>
