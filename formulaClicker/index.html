<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">

	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-G3VRHWGPB7"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag(){dataLayer.push(arguments);}
		gtag('js', new Date());

		gtag('config', 'G-G3VRHWGPB7');
	</script>

	<!-- <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script> -->

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.css" integrity="sha384-DLNWBifkkOES5azVMtIZ7RYukF2HBwDMBcPyDl6VnXTdJKlv5aO1s6mnOLE0QUyP" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.js" integrity="sha384-SReR3XDzHJ+xHgprjPZ5oBp+3gHv4arv/iWnz2PGnkUH8lAYzPIIxY0C+I6F2G/o" crossorigin="anonymous"></script>

	<title>Mathematical Clicker</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="pinnedValParent">
		<span id="tPinned" class="formula">t=0</span>
		<span id="sPinned" class="formula">s=0</span>
	</div>
	<h1 id="mainFormula">
		<span class="formula">s=</span>
		<span id="m"><!-- m="multiplier" スコアの倍率(最初は表示されない) -->
			<span class="formula">m\!</span>
			<span class="label formula">m=0</span>
		</span>
		<span class="formula"><!-- t="time" 経過した時間 この変数により、放置することでスコアが増えるようになる -->
			t
		</span>
		<span class="formula">-</span>
		<span id="s_u"><!-- s_u="used_score" 何かに支払ったスコアの数 -->
			<span class="formula">s_u</span>
			<span class="label formula">s_u=0</span>
		</span>
		<span class="formula">-</span>
		<span id="e_r"><!-- e="error" レベルを上げたことによって急に上がる誤差 -->
			<span class="formula">e_r</span>
			<span class="label formula">e_r=0</span>
		</span>
	</h1>
	<div id="shop">
		<button id="mShop">
			<span class="left">
				<span class="title">
					<span class="formula">m</span>
					<span>を解放する</span>
				</span>
				<br>
				<span class="level">0</span>
			</span>
			</span>
			<span class="right">
				<span class="effect formula">t ← \times m</span>
				<br>
				<span class="cost formula">s_u ← + 5</span>
			</span>
		</button>
	</div>
	<div id="tabBar">
		<button id="upgradeTab">
			<img src="data/arrow.svg" width="50" height="50">
			<span>Upgrade</span>
		</button>
		<button id="settingsTab">
			<img width="50" height="50">
			<span>Settings</span>
		</button>
	</div>

	<script src="script.js"></script>
</body>
</html>
